<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Дашборд</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="header">
        <nav class="nav">
            <a href="dashboard.html" class="nav-link active">Главная</a>
            <a href="courses.html" class="nav-link">Курсы</a>
            <a href="quiz.html" class="nav-link">Тесты</a>
            <a href="scan.html" class="nav-link">Сканер</a>
            <a href="chat.html" class="nav-link">AI-Чат</a>
            <a href="rating.html" class="nav-link">Рейтинг</a>
            <a href="achievements.html" class="nav-link">Ачивки</a>
            <a href="admin.html" class="nav-link">Админ</a>
        </nav>
        <div class="user-icon">
            <a href="profile.html" style="color: inherit;">
                <svg viewBox="0 0 24 24" width="28" height="28" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                    <circle cx="12" cy="7" r="4"></circle>
                </svg>
            </a>
        </div>
    </header>

    <main class="wrapper">
        <div class="grid-2">
            <div class="box score-box">
                <h3>Ваш Security Score</h3>
                <div class="circle"><span id="score-value">75/100</span></div>
                <p id="score-hint">Хороший результат!</p>
            </div>
            <div class="box">
                <h3>Статистика обучения</h3>
                <div class="row-item"><strong>Изучено курсов:</strong> <span id="stat-courses">3 из 5</span></div>
                <div class="row-item"><strong>Пройдено тестов:</strong> <span id="stat-quizzes">2 из 4</span></div>
                <div class="row-item"><strong>Отражено атак:</strong> <span id="stat-phishing">0 из 1</span></div>
                <a href="inbox.html" class="btn btn-main" style="margin-top: 15px; width: 100%;">Открыть Инбокс (Фишинг)</a>
                <a href="scan.html" class="btn btn-sub" style="margin-top: 10px; width: 100%;">Сканер угроз (VirusTotal)</a>
            </div>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
