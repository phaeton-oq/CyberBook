<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>CyberBook — Кибер-Ассистент</title>
  <link rel="stylesheet" href="/static/css/style.css" />
  <style>
    .chat-wrap { display: flex; flex-direction: column; height: 74vh;
      background: var(--card); border: 1px solid #262a33; border-radius: var(--radius); overflow: hidden; }
    .chat-log { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 12px; }
    .msg { max-width: 78%; padding: 11px 15px; border-radius: 14px; white-space: pre-wrap; line-height: 1.45; }
    .msg.user { align-self: flex-end; background: var(--mts-red); color: #fff; border-bottom-right-radius: 4px; }
    .msg.bot { align-self: flex-start; background: var(--card-2); border-bottom-left-radius: 4px; }
    .msg .who { font-size: 11px; opacity: .7; margin-bottom: 3px; }
    .chat-input { display: flex; gap: 10px; padding: 14px; border-top: 1px solid #262a33; }
    .chat-input input { flex: 1; }
    .typing { align-self: flex-start; color: var(--muted); font-size: 14px; padding: 8px 15px; }
    .suggests { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 14px; }
    .suggests button { background: var(--card-2); border: 1px solid #303540; color: var(--text);
      padding: 8px 12px; border-radius: 999px; cursor: pointer; font-size: 13px; }
    .suggests button:hover { border-color: var(--mts-red); }
    .fallback-note { color: var(--warn); font-size: 12px; }
  </style>
</head>
<body>
  <div class="topbar">
    <div class="brand"><span class="logo">CB</span> CyberBook</div>
    <nav class="nav">
      <a href="/dashboard.html">Обзор</a>
      <a href="/courses.html">Обучение</a>
      <a href="/inbox.html">Почта 📨</a>
      <a href="/assistant.html" class="active">Ассистент 🤖</a>
      <a href="/leaderboard.html">Рейтинг 🏆</a>
      <a href="#" onclick="API.logout().then(()=>location.href='/index.html')">Выход</a>
    </nav>
  </div>

  <div class="container">
    <h1>🤖 Кибер-Ассистент</h1>
    <p class="subtitle">Спроси совета по кибербезопасности в любой рабочей ситуации. Ассистент знает твои слабые места.</p>

    <div class="suggests" id="suggests">
      <button onclick="quickAsk(this)">Мне пришло странное письмо от «банка», что делать?</button>
      <button onclick="quickAsk(this)">Как придумать надёжный пароль?</button>
      <button onclick="quickAsk(this)">Звонят и просят код из СМС — это нормально?</button>
      <button onclick="quickAsk(this)">Нашёл флешку на парковке, можно вставить в рабочий ПК?</button>
    </div>

    <div class="chat-wrap">
      <div class="chat-log" id="log"></div>
      <form class="chat-input" onsubmit="return send(event)">
        <input id="input" placeholder="Напиши свой вопрос…" autocomplete="off" />
        <button class="btn">Отправить</button>
      </form>
    </div>
  </div>

  <script src="/static/js/api.js"></script>
  <script>
    const history = [];   // [{role, content}] — контекст диалога для AI
    const log = document.getElementById("log");

    function addMsg(text, who, note) {
      const div = document.createElement("div");
      div.className = "msg " + who;
      const label = who === "user" ? "Ты" : "Кибер-Ассистент";
      div.innerHTML = `<div class="who">${label}</div>${escapeHtml(text)}` +
        (note ? `<div class="fallback-note">${note}</div>` : "");
      log.appendChild(div);
      log.scrollTop = log.scrollHeight;
    }
    function escapeHtml(s) {
      return s.replace(/[&<>]/g, c => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;" }[c]));
    }

    function showTyping() {
      const t = document.createElement("div");
      t.className = "typing"; t.id = "typing"; t.textContent = "Кибер-Ассистент печатает…";
      log.appendChild(t); log.scrollTop = log.scrollHeight;
    }
    function hideTyping() { document.getElementById("typing")?.remove(); }

    function quickAsk(btn) {
      document.getElementById("input").value = btn.textContent;
      send(new Event("submit"));
    }

    async function send(e) {
      e.preventDefault();
      const input = document.getElementById("input");
      const text = input.value.trim();
      if (!text) return false;
      input.value = "";
      document.getElementById("suggests").style.display = "none";

      addMsg(text, "user");
      history.push({ role: "user", content: text });
      showTyping();

      try {
        const res = await API.chat(text, history);
        hideTyping();
        addMsg(res.reply, "bot", res.ai ? "" : "⚠️ оффлайн-режим (AI недоступен)");
        history.push({ role: "assistant", content: res.reply });
      } catch (err) {
        hideTyping();
        addMsg("Ошибка: " + err.message, "bot");
      }
      return false;
    }

    (async () => {
      const user = await requireAuth();
      addMsg(`Привет, ${user.name.split(" ")[0]}! Я твой Кибер-Ассистент. Задай вопрос или выбери подсказку выше 👆`, "bot");
    })();
  </script>
</body>
</html>
